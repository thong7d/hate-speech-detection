name: Docker

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t hate-speech-api .
      - name: Smoke test health endpoint
        run: |
          docker run -d --name hate-speech-api -p 8000:8000 hate-speech-api
          sleep 10
          curl --fail http://localhost:8000/health
          docker stop hate-speech-api
