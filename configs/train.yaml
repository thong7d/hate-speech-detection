seed: 42

data:
  dataset_name: null
  train_path: "data/processed/train.parquet"
  valid_path: "data/processed/dev.parquet"
  test_path: "data/processed/test.parquet"
  text_column: "text"
  label_column: "label"

model:
  base_model: "xlm-roberta-base"
  num_labels: 3
  max_length: 128
  labels:
    - "CLEAN"
    - "OFFENSIVE"
    - "HATE"

training:
  output_dir: "artifacts/hate_speech_model/checkpoint"
  learning_rate: 1.5e-5
  batch_size: 16
  eval_batch_size: 32
  num_epochs: 5
  weight_decay: 0.01
  metric_for_best_model: "balanced_critical_f1"
  greater_is_better: true
  save_total_limit: 2
  early_stopping_patience: 2
  fp16: false
  max_grad_norm: 1.0
  loss: "focal"
  focal_gamma: 1.5
  class_weighting: "manual"
  class_weights:
    CLEAN: 1.0
    OFFENSIVE: 1.9
    HATE: 1.5
  class_oversampling:
    enabled: true
    multipliers:
      OFFENSIVE: 1.5
      HATE: 1.15
  robustness_augmentation:
    enabled: true
    repeats: 7
  contrastive_augmentation:
    enabled: true
    repeats: 6
  diacritic_augmentation:
    enabled: true
    repeats: 4

evaluation:
  metrics_output_path: "artifacts/hate_speech_model/metrics.json"
  report_output_path: "results/evaluation_report.md"
  confusion_matrix_path: "results/confusion_matrix.png"
  loss_curve_path: "results/loss_curve.png"

export:
  artifact_dir: "artifacts/hate_speech_model"
  final_model_dir: "artifacts/hate_speech_model/model"
  push_to_hub: false
  hf_repo_id: "quanghs1020/hate-speech-detection"
