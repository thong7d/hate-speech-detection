# configs/paths.yaml
# ============================================================
# Single Source of Truth for all paths in the project.
#
# ARCHITECTURE:
#   - Data & results  → LOCAL (inside the repo, git-ignored)
#   - Model weights   → CLOUD (HuggingFace Hub)
#   - Model cache     → /tmp/hf_cache (ephemeral, not in repo)
#
# For Colab notebooks: override project_root at runtime in Cell 0.
#   e.g. project_root = "/content/hate-speech-detection"
# For local/Docker: project_root defaults to "." (repo root).
# ============================================================

# --- Root paths ---
# project_root is resolved at runtime; "." works for local and Docker.
project_root: "."

data:
  raw_dir:           "{project_root}/data/raw/vihsd"
  train_raw:         "{project_root}/data/raw/vihsd/train.csv"
  dev_raw:           "{project_root}/data/raw/vihsd/dev.csv"
  test_raw:          "{project_root}/data/raw/vihsd/test.csv"
  train_processed:   "{project_root}/data/processed/train.parquet"
  val_processed:     "{project_root}/data/processed/dev.parquet"
  test_processed:    "{project_root}/data/processed/test.parquet"

models:
  baseline:          "{project_root}/models/baseline/tfidf_lr.pkl"
  checkpoints_dir:   "{project_root}/models/xlmr_vihsd/checkpoints"
  final_hf_dir:      "{project_root}/models/xlmr_vihsd/final_hf"

results:
  class_weights:     "{project_root}/results/class_weights.json"
  baseline_report:   "{project_root}/results/baseline_report.json"
  finetune_report:   "{project_root}/results/finetune_report.json"
  error_analysis:    "{project_root}/results/error_analysis.csv"

logs:
  agent_events:      "{project_root}/logs/agent_events.jsonl"

# --- HuggingFace Hub (cloud model storage) ---
hf_model_id: "thong7d/vihsd-xlmr-hate-speech"
hf_cache: "/tmp/hf_cache"

# --- Model architecture ---
model:
  backbone: "vinai/phobert-base-v2"
  num_labels: 3
  label_map:
    0: CLEAN
    1: OFFENSIVE
    2: HATE

# --- Training config (Colab T4 optimized) ---
training:
  max_length: 128
  batch_size: 16
  eval_batch_size: 32
  num_epochs: 10
  learning_rate: 2.0e-05
  warmup_ratio: 0.1
  weight_decay: 0.01
  dataloader_num_workers: 0
  fp16: true
  save_total_limit: 2
  save_weights_only: true
  load_best_model_at_end: true
  metric_for_best_model: "eval_f1_macro"

# --- Deployment config ---
deployment:
  api_host: "0.0.0.0"
  api_port: 8000
  gradio_share: true

# --- Agent config ---
agent:
  gemini_model: "gemini-2.0-flash"
  borderline_threshold_low: 0.35
  borderline_threshold_high: 0.65
  max_clarification_rounds: 1