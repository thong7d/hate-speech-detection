api:
  host: "0.0.0.0"
  port: 8000
  reload: false

model:
  source: "huggingface"
  hf_repo_id: "thong7d/vihsd-xlmr-hate-speech"
  local_path: "artifacts/hate_speech_model/model"
  artifact_dir: "artifacts/hate_speech_model"
  label_mapping_path: "artifacts/hate_speech_model/label_mapping.json"
  metadata_path: "artifacts/hate_speech_model/metadata.json"
  metrics_path: "artifacts/hate_speech_model/metrics.json"
  max_length: 128
  use_word_segmentation: false
  thresholds:
    CLEAN: 0.5
    OFFENSIVE: 0.38
    HATE: 0.32
